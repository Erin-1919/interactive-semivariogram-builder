<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Semivariogram Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Scholarly palette — crisp white paper + deep-blue ink + vivid-blue accent */
    --paper: #ffffff;
    --paper-soft: #f4f8fd;
    --paper-deep: #dce8f5;
    --ink: #0c2d5c;
    --ink-soft: #2e5285;
    --ink-mute: #6b86a8;
    --rule: #c0d3e8;
    --rule-soft: #dde8f3;
    --accent: #1d4ed8;
    --accent-deep: #1e3a8a;
    --accent-pale: #dbeafe;
    --sage: #0891b2;
    --unknown: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 17px;
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top left, rgba(29, 78, 216, 0.06), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(8, 145, 178, 0.04), transparent 60%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.18;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.18 0 0 0 0 0.36 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  .app { position: relative; z-index: 2; }

  h1.title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 58px;
    margin: 0;
    letter-spacing: -0.02em;
  }
  h1.title em { font-style: italic; color: var(--accent); }

  /* GRID */
  .grid-svg-frame {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 18px;
    display: inline-block;
  }
  .grid-svg { display: block; }
  .cell-rect {
    fill: var(--paper);
    stroke: var(--rule);
    stroke-width: 0.5;
    transition: fill 0.12s, stroke 0.12s;
  }
  .cell-rect.unknown { fill: url(#unknownPattern); }
  .cell-rect.in-pair {
    fill: var(--accent-pale);
    stroke: var(--accent);
    stroke-width: 1.2;
  }
  .cell-rect.is-hovered {
    fill: var(--accent);
    stroke: var(--accent-deep);
    stroke-width: 1.5;
  }
  .cell-group { transition: opacity 0.1s; }
  .cell-group.faded { opacity: 0.18; }
  .cell-group.interactive { cursor: pointer; }
  .cell-rect.predict-target {
    fill: var(--accent-pale);
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 4 3;
  }
  .cell-rect.edited {
    stroke: var(--accent);
    stroke-width: 1.5;
    stroke-opacity: 0.7;
  }
  .predict-line {
    stroke: var(--accent);
    stroke-width: 1.2;
    stroke-dasharray: 4 3;
    opacity: 0.75;
    fill: none;
    pointer-events: none;
  }
  .predict-weight {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    fill: var(--accent-deep);
    font-weight: 600;
    pointer-events: none;
    paint-order: stroke;
    stroke: var(--paper);
    stroke-width: 3;
  }
  .cell-edit-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    text-align: center;
    border: 2px solid var(--accent);
    background: var(--paper);
    color: var(--ink);
    padding: 0;
  }
  .cell-edit-input:focus { outline: none; }
  .cell-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: central;
    user-select: none;
    pointer-events: none;
  }
  .cell-value.unknown {
    fill: var(--unknown);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
  }
  .cell-value.on-hovered { fill: var(--paper-soft); font-weight: 600; }
  .pair-line {
    stroke: var(--accent);
    stroke-width: 1.6;
    opacity: 0.6;
    fill: none;
    stroke-linecap: round;
    pointer-events: none;
  }
  .pair-dot { fill: var(--accent); pointer-events: none; }

  /* MASTHEAD */
  header.masthead {
    padding: 36px 48px 26px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 32px;
  }
  .masthead .eyebrow {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }
  .masthead .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: right;
    line-height: 1.9;
  }
  .masthead .meta .rule-line {
    display: inline-block; width: 80px; height: 1px;
    background: var(--rule); margin-bottom: 6px;
  }

  /* MAIN GRID */
  main.workbench {
    display: grid;
    grid-template-columns: minmax(320px, 0.85fr) minmax(640px, 1.5fr) minmax(420px, 1fr);
    min-height: calc(100vh - 130px);
  }
  .panel {
    padding: 34px 38px;
    border-right: 1px solid var(--rule);
    position: relative;
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 26px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--rule-soft);
  }
  .panel-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--accent);
  }
  .panel-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 30px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .panel-sub {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--ink-mute);
    margin-left: auto;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* CONTROLS */
  .control-block { margin-bottom: 26px; }
  .control-label {
    display: block;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  select.preset {
    appearance: none;
    width: 100%;
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 14px 40px 14px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%230c2d5c' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
  }
  select.preset:focus { outline: none; border-color: var(--accent); }

  .toggle-group {
    display: flex;
    border: 1px solid var(--rule);
    background: var(--paper-soft);
  }
  .toggle-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 10px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-right: 1px solid var(--rule);
  }
  .toggle-btn:last-child { border-right: none; }
  .toggle-btn.active { background: var(--ink); color: var(--paper); }

  .legend {
    display: flex;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    font-size: 14px;
    color: var(--ink-mute);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 16px; height: 16px; border: 1px solid var(--rule); display: inline-block; }
  .swatch.known { background: var(--paper); }
  .swatch.pair { background: var(--accent-pale); border-color: var(--accent); }
  .swatch.unknown-sw {
    background-image: repeating-linear-gradient(45deg,
      var(--unknown), var(--unknown) 2px, transparent 2px, transparent 5px);
    background-color: var(--paper-deep);
  }

  .preset-blurb {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-mute);
    margin-top: 10px;
    line-height: 1.5;
  }

  input[type=checkbox].model-toggle {
    appearance: none;
    width: 20px; height: 20px;
    border: 1px solid var(--rule);
    background: var(--paper-soft);
    margin-right: 10px;
    vertical-align: middle;
    cursor: pointer;
    position: relative;
  }
  input[type=checkbox].model-toggle:checked {
    background: var(--accent); border-color: var(--accent);
  }
  input[type=checkbox].model-toggle:checked::after {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--paper-soft); font-size: 15px;
  }
  .model-toggle-label {
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
  }

  /* LAG CHIPS */
  .lag-strip {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0;
  }
  .lag-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 9px 14px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .lag-chip:hover { border-color: var(--ink-mute); }
  .lag-chip.active {
    background: var(--accent); color: var(--paper-soft); border-color: var(--accent);
  }
  .lag-chip.upcoming { opacity: 0.4; }
  .lag-chip .n-badge { margin-left: 8px; font-size: 13px; opacity: 0.75; }

  /* STEP BUTTONS */
  .step-controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .step-btn {
    font-family: 'Manrope', sans-serif;
    font-size: 16px; font-weight: 500;
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 11px 18px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .step-btn:hover:not(:disabled) {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .step-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .step-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .step-btn.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }

  /* PLOT */
  .formula {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    text-align: center;
    padding: 18px;
    color: var(--ink);
    background: var(--paper-deep);
    margin-bottom: 18px;
  }
  .formula .accent { color: var(--accent); font-weight: 500; }

  .plot-frame {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 16px 10px 10px;
    margin-bottom: 22px;
  }
  .plot-svg { display: block; width: 100%; height: auto; }
  .axis-line { stroke: var(--ink); stroke-width: 0.9; }
  .axis-tick { stroke: var(--ink-mute); stroke-width: 0.6; }
  .axis-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    fill: var(--ink-mute);
  }
  .axis-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    fill: var(--ink);
  }
  .gridline { stroke: var(--rule-soft); stroke-width: 0.5; stroke-dasharray: 2 3; }
  .plot-point {
    fill: var(--ink);
    stroke: var(--paper-soft);
    stroke-width: 1.4;
  }
  .plot-point.selected { fill: var(--accent); }
  .plot-point-ring {
    fill: none; stroke: var(--accent); stroke-width: 1.3; opacity: 0.5;
  }
  .plot-connector {
    stroke: var(--ink-mute);
    stroke-width: 0.8;
    fill: none;
    stroke-dasharray: 1 4;
  }
  .selected-value-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    fill: var(--accent);
    font-weight: 600;
  }
  .model-curve {
    stroke: var(--sage);
    stroke-width: 1.6;
    fill: none;
    stroke-dasharray: 5 4;
    opacity: 0.85;
  }
  .model-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    fill: var(--sage);
  }
  .model-guide {
    stroke: var(--sage);
    stroke-width: 0.8;
    stroke-dasharray: 2 4;
    opacity: 0.55;
    fill: none;
  }
  .model-guide-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    fill: var(--sage);
    paint-order: stroke;
    stroke: var(--paper);
    stroke-width: 3;
  }

  /* SUMMARY */
  .summary-box {
    border: 1px solid var(--rule);
    background: var(--paper-soft);
    padding: 20px 22px;
    margin-bottom: 22px;
    border-left: 4px solid var(--accent);
  }
  .summary-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 17px;
  }
  .summary-line:last-of-type { border-bottom: none; }
  .summary-line .label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-soft);
  }
  .summary-line .val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--ink);
  }
  .summary-line .val.big {
    font-size: 24px;
    color: var(--accent);
    font-weight: 600;
  }
  .pair-table {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    border-top: 1px dashed var(--rule);
    padding-top: 14px;
  }
  .pair-table-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 6px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 8px;
  }
  .pair-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 4px 0;
    color: var(--ink-soft);
  }
  .pair-row .sq { color: var(--accent); font-weight: 500; }
  .more-note {
    margin-top: 10px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-mute);
  }
  .empty-summary {
    border: 1px dashed var(--rule);
    padding: 26px;
    color: var(--ink-mute);
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-align: center;
    margin-bottom: 22px;
    font-size: 17px;
  }
  .hover-hint {
    margin-top: 6px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-mute);
    text-align: center;
  }

  /* STEP BAR */
  .step-bar {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .step-bar .step-item {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .step-bar .step-item:hover { background: var(--paper-deep); }
  .step-bar .step-item.active {
    background: var(--accent);
    color: var(--paper-soft);
    border-color: var(--accent);
  }
  .step-bar .step-item.active .step-num {
    background: var(--paper-soft);
    color: var(--accent);
  }
  .step-bar .step-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--paper-deep);
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .step-bar .step-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 1280px) {
    .step-bar .step-label { display: none; }
    .step-bar .step-item { flex: 0 0 auto; }
  }

  /* TABBED PANEL */
  .tabbed-panel {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tabbed-panel .tabs {
    display: flex;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-soft);
  }
  .tabbed-panel .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 18px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    border-right: 1px solid var(--rule);
  }
  .tabbed-panel .tab:last-child { border-right: none; }
  .tabbed-panel .tab:hover { color: var(--ink); background: var(--paper-deep); }
  .tabbed-panel .tab.active {
    color: var(--accent);
    border-bottom: 3px solid var(--accent);
    background: var(--paper);
    font-weight: 700;
  }
  .tabbed-panel .tab-body {
    padding: 22px 26px;
    flex: 1;
    overflow-y: auto;
  }

  /* FORMULA PANEL */
  .formula-panel { font-family: 'Fraunces', serif; }
  .formula-panel .big-formula {
    font-size: 30px;
    font-style: italic;
    line-height: 1.6;
    text-align: center;
    color: var(--ink-soft);
    padding: 18px 0;
    background: var(--paper-deep);
    border-radius: 4px;
    margin-bottom: 18px;
  }
  .formula-panel .big-formula .term {
    padding: 2px 4px;
    border-radius: 3px;
    transition: background 0.15s, color 0.15s;
  }
  .formula-panel .big-formula .term.hi {
    background: var(--accent-pale);
    color: var(--accent-deep);
    font-weight: 500;
  }
  .formula-panel .caption {
    font-family: 'Manrope', sans-serif;
    font-style: normal;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .formula-panel .caption strong { color: var(--accent); }

  /* CALCULATION TABLE */
  .calc-table { font-family: 'Manrope', sans-serif; color: var(--ink-soft); }
  .calc-table .head-line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px dashed var(--rule-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-mute);
    margin-bottom: 12px;
  }
  .calc-table .head-line strong {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--ink);
    font-style: normal;
  }
  .calc-table table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
  }
  .calc-table th, .calc-table td {
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px dotted var(--rule);
  }
  .calc-table th {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--rule);
  }
  .calc-table .hidden-cell { color: var(--rule); }
  .calc-table .sq { color: var(--accent); font-weight: 500; }
  .calc-table .footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    display: grid;
    grid-template-columns: auto 1fr;
    row-gap: 6px;
    column-gap: 14px;
  }
  .calc-table .footer .label {
    font-family: 'Fraunces', serif;
    font-style: italic;

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useCallback } = React;

// ------------------------------------------------------------------
// 3×3 fixed rainfall grid — values come straight from the teaching-demo
// slides. Cardinal-only mode produces exactly h = 1 (12 pairs) and
// h = 2 (6 pairs); see test T5 for the expected γ values.
// ------------------------------------------------------------------
const DATASET_3X3 = {

  grid: [

// ------------------------------------------------------------------
// DATASETS_10X10 — 10x10 grids generated to produce instructive semivariogram shapes.
// `null` marks an unsampled cell (`?`).
// ------------------------------------------------------------------
const DATASETS_10X10 = {
  smooth: {

      [ 22,  23,  25,  24,  22,  22,  25, null,  23,  24],
      [ 22,  24,  26,  24,  20,  21,  25,  24,  20,  18],

    ]
  },
  random: {

    grid: [
      [ 33,  26,  27,  32,  25,  29,  31,  17,  13,  18],
      [ 18,  32,  32,  12,  23,  30,  15,  30,  14,  22],
      [ 30,  18,  19,  18,  28,  17,  34,  22,  22,  23],
      [ 25,  24,  23,  34,  30,  30, null,  26,  19,  34],
      [ 22,  16,  31,  15,  31,  26,  14,  13, null,  12],
      [ 15,  23,  34,  22,  30,  33,  30,  26,  22,  23],
      [ 18,  23,  20,  17,  34,  12,  14,  16,  34,  27],
      [ 32, null,  28,  20,  23,  12,  26,  31,  27,  15],
      [ 24,  18,  34,  32,  16,  23,  33,  31,  28,  26],
      [ 12,  29,  22,  14,  17,  24,  28,  23,  26,  32]
    ]
  },
  clustered: {
    label: 'Clustered / patchy pattern',
    blurb: 'Two zones produce a periodic γ(h) — it rises, peaks, then dips ("hole effect").',
    grid: [
      [ 30,  30,  30,  29,  28,  15,  15,  14,  14,  14],
      [ 30,  30,  30,  31,  27,  16,  14,  14,  14,  14],
      [ 30,  30,  30,  30,  27,  16, null,  14,  14,  16],
      [ 29,  29,  30,  31,  29,  16,  14,  14,  14,  13],
      [ 28,  27,  28,  28,  27,  19,  16,  16,  17,  15],
      [ 16,  16,  15,  16,  17,  26,  27,  28,  28,  28],
      [ 14,  15,  14, null,  17,  28,  31,  30,  30,  29],
      [ 12,  13,  14,  14,  15,  28,  30,  30,  30,  30],
      [ 14,  13,  14,  14,  17,  27,  31,  30, null,  30],
      [ 14,  14,  13,  14,  16,  27,  29,  29,  30,  30]
    ]
  }
};

// ------------------------------------------------------------------
// PURE HELPERS — semivariogram math
//
//   gamma(h) = 1 / (2 * N(h)) * sum_{pairs at exact distance h} (z_i - z_j)^2
//
// Pairs are grouped by their EXACT Euclidean distance, so h = 1 (direct
// horizontal/vertical neighbours) is distinct from h = sqrt(2) ≈ 1.41
// (diagonal neighbours). This is the correct treatment on a regular grid.
// Unknown (null) cells are excluded entirely.
//
// Far lags (h > MAX_LAG_10X10) are dropped from the visible empirical
// semivariogram because they have few pairs and become dominated by
// sampling noise / edge effects — the textbook rule of thumb is to
// limit empirical γ(h) to about half the maximum extent of the data.
// ------------------------------------------------------------------
const MAX_LAG_10X10 = 5.0; // half-extent of the 10×10 grid

function computePairs(grid, opts = {}) {
  // Back-compat: a bare `true`/`false` was the old `allDirections` boolean.
  // The in-browser tests (T1–T4) still pass booleans to exercise this path.
  if (opts === true) opts = { cardinalOnly: false };
  else if (opts === false) opts = { cardinalOnly: true };
  const cardinalOnly = !!opts.cardinalOnly;
  const maxLag = opts.maxLag;

  const known = [];
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const v = grid[r][c];
      if (v !== null && v !== undefined) known.push({ r, c, v });
    }
  }
  const pairs = [];
  for (let i = 0; i < known.length; i++) {
    for (let j = i + 1; j < known.length; j++) {
      const a = known[i], b = known[j];
      const dr = b.r - a.r, dc = b.c - a.c;
      if (cardinalOnly && dr !== 0 && dc !== 0) continue;
      const dist = Math.sqrt(dr * dr + dc * dc);
      if (maxLag !== undefined && dist > maxLag + 1e-9) continue;
      pairs.push({
        a, b, dist,
        key: dist.toFixed(6),
        label: dist.toFixed(2),
        sqDiff: (a.v - b.v) ** 2,
        dr, dc  // signed deltas; reserved for directional overlays
      });
    }
  }
  return pairs;
}

function computeSemivariogram(pairs, maxLag) {
  const groups = new Map();
  for (const p of pairs) {
    if (maxLag !== undefined && p.dist > maxLag + 1e-9) continue;
    if (!groups.has(p.key)) {
      groups.set(p.key, { h: p.dist, label: p.label, items: [] });
    }
    groups.get(p.key).items.push(p);
  }
  const lags = Array.from(groups.values()).map(g => {
    const sumSq = g.items.reduce((s, p) => s + p.sqDiff, 0);
    return {
      h: g.h,
      label: g.label,
      n: g.items.length,
      sumSq,
      gamma: sumSq / (2 * g.items.length),
      pairs: g.items
    };
  });
  lags.sort((a, b) => a.h - b.h);
  return lags;
}

// ------------------------------------------------------------------
// Conceptual prediction weights — inverse-distance, NOT Ordinary Kriging.
// Used by the 10×10 "Predict at unknown" sub-mode to show that nearby
// stations contribute, weights sum to 1, and uncertainty grows with
// distance. Real OK derives weights from the fitted variogram.
// ------------------------------------------------------------------
function predictionWeights(target, knownCells, k = 6, maxLag = MAX_LAG_10X10) {
  const withDist = knownCells.map(cell => {
    const dr = cell.r - target.r;
    const dc = cell.c - target.c;
    return { cell, d: Math.sqrt(dr * dr + dc * dc) };
  });
  withDist.sort((a, b) => a.d - b.d);
  const chosen = withDist.slice(0, k);
  const eps = 1e-6; // guard: prevents 1/0 if target coincides with a known cell
  const rawWeights = chosen.map(n => 1 / (n.d * n.d + eps));
  const sumRaw = rawWeights.reduce((s, w) => s + w, 0);
  const neighbors = chosen.map((n, i) => ({
    cell: n.cell,
    d: n.d,
    w: rawWeights[i] / sumRaw
  }));
  const zHat = neighbors.reduce((s, n) => s + n.w * n.cell.v, 0);
  const meanD = neighbors.reduce((s, n) => s + n.d, 0) / neighbors.length;
  const u = Math.min(1, meanD / maxLag);
  return { neighbors, zHat, u };
}

// ------------------------------------------------------------------
// Inline self-tests — assertions run once on page load and report to
// the browser console. A failure prints in red so it cannot be missed.
// ------------------------------------------------------------------
(function runTests() {
  const eq = (a, b, msg) => {
    if (Math.abs(a - b) > 1e-9) console.error('FAIL:', msg, 'got', a, 'want', b);
    else console.log('ok  ', msg);
  };

  // Test 1: 2x2 all directions — h=1 (cardinal) is SEPARATE from h=sqrt(2) (diagonal).
  //   pairs at h=1:    (1,2)sq=1, (1,3)sq=4, (2,4)sq=4, (3,4)sq=1   sumSq=10, N=4, γ=10/8=1.25
  //   pairs at h=√2:   (1,4)sq=9, (2,3)sq=1                          sumSq=10, N=2, γ=10/4=2.5
  {
    const grid = [[1, 2], [3, 4]];
    const lags = computeSemivariogram(computePairs(grid, true));
    eq(lags.length, 2, 'T1: two distinct lags');
    eq(lags[0].n, 4, 'T1: N(h=1) = 4');
    eq(lags[0].gamma, 1.25, 'T1: gamma(h=1) = 1.25');
    eq(lags[1].n, 2, 'T1: N(h=√2) = 2');
    eq(lags[1].gamma, 2.5, 'T1: gamma(h=√2) = 2.5');
  }

  // Test 2: 2x2 cardinal — diagonal pair excluded entirely.
  {
    const grid = [[1, 2], [3, 4]];
    const lags = computeSemivariogram(computePairs(grid, false));
    eq(lags.length, 1, 'T2: cardinal — only h=1');
    eq(lags[0].n, 4, 'T2: N(h=1) = 4');
    eq(lags[0].gamma, 1.25, 'T2: gamma(h=1) = 1.25');
  }

  // Test 3: unknown cells excluded.
  //   grid: [[1, null], [3, 4]]  known: 1, 3, 4
  //   pairs (all dir): (1,3) h=1 sq=4, (3,4) h=1 sq=1, (1,4) h=√2 sq=9
  {
    const grid = [[1, null], [3, 4]];
    const lags = computeSemivariogram(computePairs(grid, true));
    eq(lags[0].n, 2, 'T3: N(h=1) = 2 (unknown excluded)');
    eq(lags[0].sumSq, 4 + 1, 'T3: sumSq(h=1) = 5');
    eq(lags[1].n, 1, 'T3: N(h=√2) = 1');
    eq(lags[1].sumSq, 9, 'T3: sumSq(h=√2) = 9');
  }

  // Test 4: MAX_LAG_10X10 filter drops far pairs from the visible semivariogram.
  //   grid 1×6: distances available are 1,2,3,4,5. With maxLag=3 we keep h≤3.
  {
    const grid = [[1, 2, 3, 4, 5, 6]];
    const lags = computeSemivariogram(computePairs(grid, false), 3);
    eq(lags.length, 3, 'T4: lags capped at h=3');
    eq(lags[0].h, 1, 'T4: first kept h=1');
    eq(lags[lags.length - 1].h, 3, 'T4: last kept h=3');
    // Also verify opts.maxLag pre-filters at the computePairs level.
    const pairsCapped = computePairs(grid, { cardinalOnly: true, maxLag: 3 });
    const pairsAll = computePairs(grid, { cardinalOnly: true });
    eq(pairsAll.length > pairsCapped.length ? 1 : 0, 1, 'T4: opts.maxLag pre-filters in computePairs');
    eq(pairsCapped.every(p => p.dist <= 3 + 1e-9) ? 1 : 0, 1, 'T4: opts.maxLag drops every pair above the cap');
  }

  // Test 5: 3×3 fixed grid, cardinal-only — matches the lecture-slide hand calc.
  //   h = 1: 12 pairs; sumSq = 52; γ(1) = 52/24
  //   h = 2: 6 pairs;  sumSq = 100; γ(2) = 100/12
  {
    const grid = DATASET_3X3.grid;
    const lags = computeSemivariogram(computePairs(grid, { cardinalOnly: true }));
    eq(lags.length, 2, 'T5: two distinct lags (h=1, h=2)');
    eq(lags[0].h, 1, 'T5: first lag is h=1');
    eq(lags[0].n, 12, 'T5: N(1) = 12');
    eq(lags[0].sumSq, 52, 'T5: sumSq(1) = 52');
    eq(lags[0].gamma, 52 / 24, 'T5: γ(1) = 52/24');
    eq(lags[1].h, 2, 'T5: second lag is h=2');
    eq(lags[1].n, 6, 'T5: N(2) = 6');
    eq(lags[1].sumSq, 100, 'T5: sumSq(2) = 100');
    eq(lags[1].gamma, 100 / 12, 'T5: γ(2) = 100/12');
  }

  // Test 6: modelGamma is monotonic non-decreasing on [0, 2a] for c0, c1 ≥ 0.
  {
    const model = (name) => ({ name, c0: 0.5, c1: 2, a: 3 });
    for (const name of ['spherical', 'exponential', 'gaussian']) {
      const m = model(name);
      let prev = -Infinity;
      let ok = true;
      for (let h = 0; h <= 6; h += 0.1) {
        const g = modelGamma(m, h);
        if (g + 1e-9 < prev) { ok = false; break; }
        prev = g;
      }
      eq(ok ? 1 : 0, 1, 'T6: ' + name + ' is monotonic non-decreasing');
    }
    // At h = 0 every model returns the nugget exactly.
    eq(modelGamma(model('spherical'), 0), 0.5, 'T6: spherical(0) = c0');
    eq(modelGamma(model('exponential'), 0), 0.5, 'T6: exponential(0) = c0');
    eq(modelGamma(model('gaussian'), 0), 0.5, 'T6: gaussian(0) = c0');
    // At h ≫ a every model approaches the sill.
    const big = 50;
    const sph = modelGamma(model('spherical'), big);
    const exp = modelGamma(model('exponential'), big);
    const gau = modelGamma(model('gaussian'), big);
    eq(sph, 2.5, 'T6: spherical reaches c0+c1 above range');
    eq(exp, 2.5, 'T6: exponential reaches c0+c1 above range');
    eq(gau, 2.5, 'T6: gaussian reaches c0+c1 above range');
  }

  // Test 7: predictionWeights — weights sum to 1; zHat bounded by neighbour values.
  {
    const target = { r: 0, c: 0 };
    const knowns = [
      { r: 0, c: 1, v: 10 },
      { r: 1, c: 0, v: 20 },
      { r: 1, c: 1, v: 30 },
      { r: 5, c: 5, v: 100 }
    ];
    const out = predictionWeights(target, knowns, 3);
    eq(out.neighbors.length, 3, 'T7: takes the 3 nearest neighbours');
    const sumW = out.neighbors.reduce((s, n) => s + n.w, 0);
    eq(Math.abs(sumW - 1) < 1e-9 ? 1 : 0, 1, 'T7: weights sum to 1');
    const minV = Math.min(...out.neighbors.map(n => n.cell.v));
    const maxV = Math.max(...out.neighbors.map(n => n.cell.v));
    eq(out.zHat >= minV - 1e-9 && out.zHat <= maxV + 1e-9 ? 1 : 0, 1,
       'T7: zHat is within [min, max] of selected neighbours');
    eq(out.u >= 0 && out.u <= 1 ? 1 : 0, 1, 'T7: uncertainty in [0,1]');
    // Saturation: target far from all knowns — u should clamp to 1.
    const farKnowns = [
      { r: 9, c: 9, v: 50 },
      { r: 8, c: 9, v: 50 },
      { r: 9, c: 8, v: 50 }
    ];
    const outFar = predictionWeights({ r: 0, c: 0 }, farKnowns, 3);
    eq(outFar.u, 1, 'T7: uncertainty saturates to 1 when meanD >= maxLag');
  }

  console.log('%c[semivariogram tests done]', 'color:#1d4ed8;font-weight:bold');
})();

// ------------------------------------------------------------------
// GridView — SVG render of the sample grid with optional pair-line
// overlay and hover-driven focus filtering.
// ------------------------------------------------------------------
function GridView({
  grid,
  highlightedPairs,
  hoveredCell,
  onCellHover,
  size = 580,
  onEdit,                 // optional (r, c, value | null) => void
  predictTarget = null,   // optional { r, c }
  predictNeighbors = null,// optional [{ cell:{r,c,v}, w, d }]
  editedKeys = null,      // optional Set of "r-c" strings
  onTargetClick = null    // optional (cell) => void
}) {
  const [editing, setEditing] = useState(null); // { r, c, raw }
  const editingRef = React.useRef(null);
  const N = grid.length;
  const padding = 22;
  const inner = size - padding * 2;
  const cellSize = inner / N;
  const center = (idx) => padding + idx * cellSize + cellSize / 2;

  let drawnPairs = highlightedPairs || [];
  if (hoveredCell && highlightedPairs) {
    drawnPairs = highlightedPairs.filter(p =>
      (p.a.r === hoveredCell.r && p.a.c === hoveredCell.c) ||
      (p.b.r === hoveredCell.r && p.b.c === hoveredCell.c)
    );
  }
  const inDrawn = new Set();
  drawnPairs.forEach(p => {
    inDrawn.add(`${p.a.r}-${p.a.c}`);
    inDrawn.add(`${p.b.r}-${p.b.c}`);
  });

  const hoverActive = !!hoveredCell;

  const commitEdit = (r, c, raw) => {
    if (editingRef.current === null) return; // already committed or cancelled
    editingRef.current = null;
    setEditing(null);
    if (!onEdit) return;
    const trimmed = (raw == null ? '' : String(raw)).trim();
    if (trimmed === '') {
      onEdit(r, c, null);
      return;
    }
    const num = Number(trimmed);
    if (Number.isFinite(num)) onEdit(r, c, num);
  };

  const startEdit = (r, c, v) => {
    if (!onEdit) return;
    const next = { r, c, raw: v === null || v === undefined ? '' : String(v) };
    editingRef.current = next;
    setEditing(next);
  };

  const handleCellClick = (r, c, v) => {
    const isUnknown = v === null || v === undefined;
    if (isUnknown && predictTarget && onTargetClick) {
      onTargetClick({ r, c });
      return;
    }
    if (!isUnknown && onEdit) startEdit(r, c, v);
  };

  return (
    <svg className="grid-svg" width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <pattern id="unknownPattern" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
          <rect width="6" height="6" fill="var(--paper-deep)" />
          <line x1="0" y1="0" x2="0" y2="6" stroke="var(--unknown)" strokeWidth="1.5" />
        </pattern>
      </defs>

      {grid.map((row, r) =>
        row.map((v, c) => {
          const isUnknown = v === null || v === undefined;
          const k = `${r}-${c}`;
          const isHovered = hoverActive && hoveredCell.r === r && hoveredCell.c === c;
          const isInPair = inDrawn.has(k);
          const isTarget = predictTarget && predictTarget.r === r && predictTarget.c === c;
          const isEdited = editedKeys && editedKeys.has(k);
          const fade = hoverActive && !isHovered && !isInPair;
          const isEditingThis = editing && editing.r === r && editing.c === c;
          const cellClasses = [
            'cell-rect',
            isUnknown ? 'unknown' : '',
            !isUnknown && isInPair && !isHovered ? 'in-pair' : '',
            isHovered ? 'is-hovered' : '',
            isTarget ? 'predict-target' : '',
            isEdited ? 'edited' : ''
          ].filter(Boolean).join(' ');
          const interactive = !isUnknown || (isUnknown && predictTarget && onTargetClick);
          return (
            <g
              key={k}
              className={`cell-group ${fade ? 'faded' : ''} ${interactive ? 'interactive' : ''}`}
              onMouseEnter={!isUnknown ? () => onCellHover && onCellHover({ r, c }) : undefined}
              onMouseLeave={!isUnknown ? () => onCellHover && onCellHover(null) : undefined}
              onClick={interactive ? () => handleCellClick(r, c, v) : undefined}
            >
              <rect
                className={cellClasses}
                x={padding + c * cellSize}
                y={padding + r * cellSize}
                width={cellSize}
                height={cellSize}
              />
              {!isEditingThis && (
                <text
                  className={`cell-value ${isUnknown ? 'unknown' : ''} ${isHovered ? 'on-hovered' : ''}`}
                  x={center(c)}
                  y={center(r)}
                >
                  {isUnknown ? '?' : v}
                </text>
              )}
              {isEditingThis && (
                <foreignObject
                  x={padding + c * cellSize + 4}
                  y={padding + r * cellSize + 4}
                  width={cellSize - 8}
                  height={cellSize - 8}
                >
                  <input
                    className="cell-edit-input"
                    type="number"
                    autoFocus
                    value={editing.raw}
                    onChange={(e) => setEditing({ r, c, raw: e.target.value })}
                    onBlur={(e) => commitEdit(r, c, e.currentTarget.value)}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') { e.preventDefault(); commitEdit(r, c, editing.raw); }
                      else if (e.key === 'Escape') {
                        e.preventDefault();
                        editingRef.current = null;
                        setEditing(null);
                      }
                    }}
                  />
                </foreignObject>
              )}
            </g>
          );
        })
      )}

      {drawnPairs.map((p, i) => {
        const x1 = center(p.a.c), y1 = center(p.a.r);
        const x2 = center(p.b.c), y2 = center(p.b.r);
        return (
          <g key={`pair-${i}`}>
            <line className="pair-line" x1={x1} y1={y1} x2={x2} y2={y2} />
            <circle className="pair-dot" cx={x1} cy={y1} r={3} />
            <circle className="pair-dot" cx={x2} cy={y2} r={3} />
          </g>
        );
      })}

      {predictTarget && predictNeighbors && predictNeighbors.map((n, i) => {
        const x1 = center(predictTarget.c), y1 = center(predictTarget.r);
        const x2 = center(n.cell.c), y2 = center(n.cell.r);
        const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
        return (
          <g key={`pred-${i}`}>
            <line className="predict-line" x1={x1} y1={y1} x2={x2} y2={y2} />
            <text className="predict-weight" x={mx} y={my - 4} textAnchor="middle">
              w={n.w.toFixed(2)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ------------------------------------------------------------------
// Theoretical models — auto-fit from the revealed empirical lags.
//   spherical:   c0 + c1 · (1.5·(h/a) − 0.5·(h/a)³)   h ≤ a
//                c0 + c1                              h > a
//   exponential: c0 + c1 · (1 − exp(−3·h/a))
//   gaussian:    c0 + c1 · (1 − exp(−3·(h/a)²))
// The factor 3 in exponential/Gaussian gives a "practical range" at h = a
// (γ reaches ~95 % of the sill), matching the spherical convention.
// ------------------------------------------------------------------
function fitModel(name, revealedLags) {
  if (!revealedLags || revealedLags.length < 2) return null;
  const sorted = [...revealedLags].sort((a, b) => a.h - b.h);
  const c0 = Math.max(0, sorted[0].gamma);
  const sill = Math.max(...sorted.map(l => l.gamma));
  const c1 = Math.max(0.0001, sill - c0);
  const threshold = c0 + 0.95 * c1;
  const reached = sorted.find(l => l.gamma >= threshold);
  const a = reached ? reached.h : sorted[sorted.length - 1].h;
  return { name, c0, c1, a, sill: c0 + c1 };
}

function modelGamma(model, h) {
  if (!model || h < 0) return 0;
  const { name, c0, c1, a } = model;
  if (name === 'spherical') {
    if (h >= a) return c0 + c1;
    const x = h / a;
    return c0 + c1 * (1.5 * x - 0.5 * x ** 3);
  }
  if (name === 'exponential') {
    return c0 + c1 * (1 - Math.exp(-3 * h / a));
  }
  if (name === 'gaussian') {
    return c0 + c1 * (1 - Math.exp(-3 * (h / a) ** 2));
  }
  return 0;
}

function niceStep(range, targetTicks) {
  const raw = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3) step = 2;
  else if (norm < 7) step = 5;
  else step = 10;
  return step * mag;
}

// ------------------------------------------------------------------
// SemivariogramPlot — SVG plot with axes, points, optional model.
// ------------------------------------------------------------------
function SemivariogramPlot({ lags, selectedIdx, revealedCount, modelName = 'none', width = 540, height = 340 }) {
  const margin = { top: 22, right: 28, bottom: 56, left: 68 };
  const innerW = width - margin.left - margin.right;
  const innerH = height - margin.top - margin.bottom;
  const visibleLags = lags.slice(0, revealedCount);

  // Use the full lag set for axis domains so axes stay stable across reveals
  const maxH = Math.max(...lags.map(l => l.h), 1);
  const maxG = Math.max(...lags.map(l => l.gamma), 1);
  const xScale = (h) => margin.left + (h / (maxH * 1.05)) * innerW;
  const yScale = (g) => margin.top + innerH - (g / (maxG * 1.1)) * innerH;

  const xTicks = [];
  for (let t = 0; t <= Math.ceil(maxH * 1.05); t++) xTicks.push(t);
  const yStep = niceStep(maxG * 1.1, 5);
  const yTicks = [];
  for (let t = 0; t <= maxG * 1.1 + 1e-6; t += yStep) yTicks.push(t);

  const model = modelName !== 'none' ? fitModel(modelName, visibleLags) : null;
  let modelPath = null;
  if (model) {
    const samples = 80;
    const pts = [];
    for (let i = 0; i <= samples; i++) {
      const h = (i / samples) * maxH * 1.05;
      pts.push(`${i === 0 ? 'M' : 'L'} ${xScale(h)} ${yScale(modelGamma(model, h))}`);
    }
    modelPath = pts.join(' ');
  }

  return (
    <svg className="plot-svg" viewBox={`0 0 ${width} ${height}`}>
      {yTicks.map((t, i) => (
        <line key={`gy-${i}`} className="gridline"
          x1={margin.left} x2={margin.left + innerW}
          y1={yScale(t)} y2={yScale(t)} />
      ))}
      <line className="axis-line"
        x1={margin.left} x2={margin.left + innerW}
        y1={margin.top + innerH} y2={margin.top + innerH} />
      <line className="axis-line"
        x1={margin.left} x2={margin.left}
        y1={margin.top} y2={margin.top + innerH} />

      {xTicks.map((t, i) => (
        <g key={`tx-${i}`}>
          <line className="axis-tick"
            x1={xScale(t)} x2={xScale(t)}
            y1={margin.top + innerH} y2={margin.top + innerH + 6} />
          <text className="axis-text"
            x={xScale(t)} y={margin.top + innerH + 22}
            textAnchor="middle">{t}</text>
        </g>
      ))}
      {yTicks.map((t, i) => (
        <g key={`ty-${i}`}>
          <line className="axis-tick"
            x1={margin.left - 6} x2={margin.left}
            y1={yScale(t)} y2={yScale(t)} />
          <text className="axis-text"
            x={margin.left - 10} y={yScale(t)}
            textAnchor="end" dominantBaseline="central">
            {t.toFixed(t < 10 ? 1 : 0)}
          </text>
        </g>
      ))}

      <text className="axis-label"
        x={margin.left + innerW / 2}
        y={height - 12}
        textAnchor="middle">lag distance h</text>
      <text className="axis-label"
        x={-margin.top - innerH / 2}
        y={20}
        transform="rotate(-90)"
        textAnchor="middle">semivariance γ(h)</text>

      {visibleLags.length > 1 && (
        <path className="plot-connector"
          d={visibleLags
            .map((l, i) => `${i === 0 ? 'M' : 'L'} ${xScale(l.h)} ${yScale(l.gamma)}`)
            .join(' ')} />
      )}

      {modelPath && model && (() => {
        const yNugget = yScale(model.c0);
        const ySill = yScale(model.sill);
        const xRange = xScale(model.a);
        const xLeft = margin.left;
        const xRight = margin.left + innerW;
        const yTop = margin.top;
        const yBottom = margin.top + innerH;
        return (
          <g>
            <line className="model-guide" x1={xLeft} x2={xRight} y1={yNugget} y2={yNugget} />
            <text className="model-guide-label" x={xLeft + 6} y={yNugget - 4}>
              nugget c₀ = {model.c0.toFixed(2)}
            </text>
            <line className="model-guide" x1={xLeft} x2={xRight} y1={ySill} y2={ySill} />
            <text className="model-guide-label" x={xRight - 6} y={ySill - 4} textAnchor="end">
              sill c₀+c₁ = {model.sill.toFixed(2)}
            </text>
            <line className="model-guide" x1={xRange} x2={xRange} y1={yTop} y2={yBottom} />
            <text className="model-guide-label" x={xRange + 4} y={yBottom - 6}>
              range a = {model.a.toFixed(2)}
            </text>
            <path className="model-curve" d={modelPath} />
            <text className="model-label"
              x={xScale(maxH * 0.98)}
              y={ySill - 22}
              textAnchor="end">
              {model.name}
            </text>
          </g>
        );
      })()}

      {visibleLags.map((l, i) => {
        const selected = i === selectedIdx;
        return (
          <g key={`pt-${i}`}>
            {selected && (
              <circle className="plot-point-ring"
                cx={xScale(l.h)} cy={yScale(l.gamma)} r={13} />
            )}
            <circle className={`plot-point ${selected ? 'selected' : ''}`}
              cx={xScale(l.h)} cy={yScale(l.gamma)} r={selected ? 7 : 5} />
            {selected && (
              <text className="selected-value-label"
                x={xScale(l.h)} y={yScale(l.gamma) - 16}
                textAnchor="middle">
                γ = {l.gamma.toFixed(2)}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// ------------------------------------------------------------------
// CalculationSummary — selected-lag report card.
// ------------------------------------------------------------------
function CalculationSummary({ lag }) {

      <div className="empty-summary">

      </div>
    );
  }
  const MAX_ROWS = 8;
  const showRows = lag.pairs.slice(0, MAX_ROWS);
  const more = lag.pairs.length - showRows.length;
  return (
    <div className="summary-box">
      <div className="summary-line">
        <span className="label">selected lag distance</span>
        <span className="val">h = {lag.label}</span>
      </div>
      <div className="summary-line">
        <span className="label">number of valid pairs</span>
        <span className="val">N(h) = {lag.n}</span>
      </div>
      <div className="summary-line">
        <span className="label">sum of squared differences</span>
        <span className="val">Σ = {lag.sumSq.toFixed(2)}</span>
      </div>
      <div className="summary-line">
        <span className="label">semivariance</span>
        <span className="val big">γ(h) = {lag.gamma.toFixed(2)}</span>
      </div>
      <div className="pair-table">
        <div className="pair-table-header">
          <span>pair (z_i, z_j)</span>
          <span>diff</span>
          <span>(diff)²</span>
        </div>
        {showRows.map((p, i) => (
          <div className="pair-row" key={i}>
            <span>({p.a.v}, {p.b.v})</span>
            <span>{(p.a.v - p.b.v).toFixed(0)}</span>
            <span className="sq">{p.sqDiff.toFixed(0)}</span>
          </div>
        ))}
        {more > 0 && (
          <div className="more-note">
            showing first {MAX_ROWS} of {lag.pairs.length} pairs

}

// ------------------------------------------------------------------
// StepBar — horizontal numbered scaffold. Soft-scaffold: clicking any
// step jumps to it, nothing is gated.
//
// Props:
//   steps        Array<string>     step labels in order
//   activeStep   number            1-based index of the active step
//   onStep       (idx) => void     called with the 1-based step index
// ------------------------------------------------------------------
function StepBar({ steps, activeStep, onStep }) {
  return (
    <div className="step-bar">
      {steps.map((label, i) => {
        const idx = i + 1;
        const isActive = idx === activeStep;
        return (
          <button
            key={idx}
            type="button"
            className={`step-item ${isActive ? 'active' : ''}`}
            onClick={() => onStep(idx)}
            title={`${idx}. ${label}`}
          >
            <span className="step-num">{idx}</span>
            <span className="step-label">{label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ------------------------------------------------------------------
// TabbedPanel — tab strip plus a single visible content slot.
// `tabs` is [{ key, label }]; `children` is a map { [key]: ReactNode }.
// ------------------------------------------------------------------
function TabbedPanel({ tabs, activeTab, onTab, children }) {
  return (
    <div className="tabbed-panel" role="tablist">
      <div className="tabs">
        {tabs.map(t => (
          <button
            key={t.key}
            type="button"
            role="tab"
            aria-selected={t.key === activeTab}
            className={`tab ${t.key === activeTab ? 'active' : ''}`}
            onClick={() => onTab(t.key)}
          >
            {t.label}
          </button>
        ))}
      </div>
      <div className="tab-body">
        {children[activeTab] ?? (
          <p style={{ color: 'var(--ink-mute)', fontStyle: 'italic' }}>
            (no content for tab "{activeTab}")
          </p>
        )}
      </div>
    </div>
  );
}

// ------------------------------------------------------------------
// FormulaPanel — γ(h) with terms that highlight based on `highlight`.
//   highlight ∈ 'h' | 'z_i' | 'z_j' | 'diff' | 'sq' | 'sum' | 'N' | 'oneOver2N' | null
// ------------------------------------------------------------------
function FormulaPanel({ highlight }) {
  const klass = (key) => 'term' + (highlight === key ? ' hi' : '');
  const captions = {
    null:        'Press the next step to walk through each piece of this formula.',
    h:           <span><strong>h</strong> is the lag distance — the spacing between the two stations in each pair.</span>,
    z_i:         <span><strong>Z(x<sub>i</sub>)</strong> is one observed rainfall value at station <em>x<sub>i</sub></em>.</span>,
    z_j:         <span><strong>Z(x<sub>i</sub> + h)</strong> is the rainfall value at the station <em>h</em> away.</span>,
    diff:        <span><strong>The difference</strong> of the two paired values tells us how alike they are.</span>,
    sq:          <span><strong>Squaring</strong> the difference removes the sign and emphasises large gaps.</span>,
    sum:         <span><strong>Σ</strong> sums the squared differences across every valid pair at this lag.</span>,
    N:           <span><strong>N(h)</strong> is the number of valid pairs at this lag.</span>,
    oneOver2N:   <span><strong>1 / [2N(h)]</strong> turns the sum into an average and then halves it — that is the semivariance γ(h).</span>
  };
  const caption = captions[highlight] !== undefined ? captions[highlight] : captions[null];
  return (
    <div className="formula-panel">
      <div className="big-formula">
        γ(<span className={klass('h')}>h</span>) ={' '}
        <span className={klass('oneOver2N')}>1 / [2<span className={klass('N')}>N(h)</span>]</span>{' '}
        ·{' '}
        <span className={klass('sum')}>Σ</span>{' '}
        <span className={klass('sq')}>[
          <span className={klass('diff')}>
            <span className={klass('z_i')}>Z(x<sub>i</sub>)</span>{' '}−{' '}
            <span className={klass('z_j')}>Z(x<sub>i</sub> + h)</span>
          </span>
        ]<sup>2</sup></span>
      </div>
      <div className="caption">{caption}</div>
      <div className="caption" style={{ color: 'var(--ink-mute)' }}>
        Plain-language: how different are paired observations, on average, at a given distance?
      </div>
    </div>
  );
}

// ------------------------------------------------------------------
// CalculationTable — pair-by-pair calculation. `revealColumns` is a
// Set-like object with boolean flags { diff, sq, sum, gamma } so steps
// 4–7 fill in columns one at a time.
// ------------------------------------------------------------------
function CalculationTable({ lag, revealColumns = { diff: true, sq: true, sum: true, gamma: true }, maxRows = 8 }) {
  if (!lag) {
    return (
      <div className="calc-table">
        <div className="empty">Choose a lag distance to see the pair calculation.</div>
      </div>
    );
  }
  const rows = lag.pairs.slice(0, maxRows);
  const more = lag.pairs.length - rows.length;
  return (
    <div className="calc-table">
      <div className="head-line">
        <span>lag distance</span><strong>h = {lag.label}</strong>
      </div>
      <table>
        <thead>
          <tr>
            <th>(z<sub>i</sub>, z<sub>j</sub>)</th>
            <th>diff</th>
            <th>(diff)<sup>2</sup></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((p, i) => {
            const diff = p.a.v - p.b.v;
            return (
              <tr key={i}>
                <td>({p.a.v}, {p.b.v})</td>
                <td className={revealColumns.diff ? '' : 'hidden-cell'}>
                  {revealColumns.diff ? diff.toFixed(0) : '…'}
                </td>
                <td className={'sq ' + (revealColumns.sq ? '' : 'hidden-cell')}>
                  {revealColumns.sq ? p.sqDiff.toFixed(0) : '…'}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {more > 0 && (
        <div style={{ marginTop: 8, fontStyle: 'italic', color: 'var(--ink-mute)', fontSize: 14 }}>
          showing first {maxRows} of {lag.pairs.length} pairs
        </div>
      )}
      <div className="footer">
        <span className="label">N(h)</span>
        <span className="val">{lag.n}</span>
        <span className="label">Σ (diff)²</span>
        <span className="val">{revealColumns.sum ? lag.sumSq.toFixed(2) : '…'}</span>
        <span className="label">γ(h) = Σ / [2N(h)]</span>
        <span className="val big">{revealColumns.gamma ? lag.gamma.toFixed(2) : '…'}</span>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------
// App
// ------------------------------------------------------------------
function App() {
  const [presetKey, setPresetKey] = useState('smooth');
  const [allDirections, setAllDirections] = useState(true);
  const [modelName, setModelName] = useState('none');
  const [selectedIdx, setSelectedIdx] = useState(0);
  const [revealedCount, setRevealedCount] = useState(0);
  const [hoveredCell, setHoveredCell] = useState(null);

  const preset = DATASETS_10X10[presetKey];
  const [editedGrid, setEditedGrid] = useState(null);
  const grid = editedGrid || preset.grid;
  const pairs = useMemo(
    () => computePairs(grid, { cardinalOnly: !allDirections }),
    [grid, allDirections]
  );
  const lags = useMemo(() => computeSemivariogram(pairs, MAX_LAG_10X10), [pairs]);

  // Reset progression when the lag set changes
  useEffect(() => {
    setRevealedCount(0);
    setSelectedIdx(0);
    setHoveredCell(null);
  }, [presetKey, allDirections]);

  useEffect(() => { setEditedGrid(null); }, [presetKey]);

  const selectedLag = revealedCount > 0 ? lags[selectedIdx] : null;
  const highlightedPairs = selectedLag ? selectedLag.pairs : null;

  const onNext = useCallback(() => {
    setRevealedCount(rc => {
      if (rc >= lags.length) return rc;
      const next = rc + 1;
      setSelectedIdx(next - 1);
      return next;
    });
  }, [lags.length]);

  const onPrev = useCallback(() => {
    setRevealedCount(rc => {
      if (rc <= 0) return rc;
      const next = rc - 1;
      setSelectedIdx(Math.max(0, next - 1));
      return next;
    });
  }, []);

  const onReset = useCallback(() => {
    setRevealedCount(0);
    setSelectedIdx(0);
    setHoveredCell(null);
  }, []);

  const onChipClick = useCallback((i) => {
    setRevealedCount(rc => Math.max(rc, i + 1));
    setSelectedIdx(i);
  }, []);

  const onCellEdit = useCallback((r, c, value) => {
    setEditedGrid(prev => {
      const base = prev || preset.grid;
      const next = base.map(row => row.slice());
      next[r][c] = value;
      return next;
    });
  }, [preset.grid]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); onNext(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); onPrev(); }
      else if (e.key === 'Home') { e.preventDefault(); onReset(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onNext, onPrev, onReset]);

  return (
    <div className="app">
      <header className="masthead">
        <div>
          <div className="eyebrow">Ordinary Kriging · Teaching Demonstration</div>
          <h1 className="title">
            Interactive <em>Semivariogram</em> Builder
          </h1>
        </div>
        <div className="meta">
          <div><span className="rule-line"></span></div>
          <div>10 × 10 sample grid</div>
          <div>γ(h) at exact lag distances</div>
          <div>← / → to step lags</div>
        </div>
      </header>

      <main className="workbench">
        {/* §1 — Controls */}
        <section className="panel">
          <div className="panel-header">
            <span className="panel-num">§ 1</span>
            <h2 className="panel-title">Controls</h2>
            <span className="panel-sub">{preset.label}</span>
          </div>

          <div className="control-block">
            <label className="control-label">Dataset preset</label>
            <select className="preset" value={presetKey}
              onChange={e => setPresetKey(e.target.value)}>
              {Object.entries(DATASETS_10X10).map(([k, d]) =>
                <option key={k} value={k}>{d.label}</option>)}
            </select>
            <div className="preset-blurb">{preset.blurb}</div>
          </div>

          <div className="control-block">
            <label className="control-label">Direction mode</label>
            <div className="toggle-group">
              <button className={`toggle-btn ${!allDirections ? 'active' : ''}`}
                onClick={() => setAllDirections(false)}>Cardinal only</button>
              <button className={`toggle-btn ${allDirections ? 'active' : ''}`}
                onClick={() => setAllDirections(true)}>All directions</button>
            </div>
            <div className="preset-blurb">
              {allDirections
                ? 'Includes diagonals — realistic omnidirectional semivariogram.'
                : 'Horizontal and vertical only — mirrors the manual exercise.'}
            </div>
          </div>

          <div className="control-block">
            <label className="model-toggle-label">
              <input type="checkbox" className="model-toggle"
                checked={modelName !== 'none'}
                onChange={e => setModelName(e.target.checked ? 'spherical' : 'none')} />
              Show fitted model
            </label>
          </div>

          <div className="legend">
            <span className="legend-item"><span className="swatch known"></span> observed value</span>
            <span className="legend-item"><span className="swatch pair"></span> paired cell</span>
            <span className="legend-item"><span className="swatch unknown-sw"></span> unsampled (?)</span>
          </div>
        </section>

        {/* §2 — Pairs */}
        <section className="panel">
          <div className="panel-header">
            <span className="panel-num">§ 2</span>
            <h2 className="panel-title">Point pairs at h</h2>
            <span className="panel-sub">
              {selectedLag
                ? `h = ${selectedLag.label} · N = ${selectedLag.n}${hoveredCell ? ' · isolating one cell' : ''}`
                : 'press Next to start'}
            </span>
          </div>

          <div className="grid-svg-frame" style={{ display: 'flex', justifyContent: 'center' }}>
            <GridView
              grid={grid}
              highlightedPairs={highlightedPairs}
              hoveredCell={hoveredCell}
              onCellHover={setHoveredCell}
              size={580}
              onEdit={onCellEdit}
            />
          </div>
          {selectedLag && (
            <div className="hover-hint">
              Hover any cell to focus on pairs from that point only.
            </div>
          )}

          <label className="control-label" style={{ marginTop: 22 }}>
            Lag distance h — click to reveal up to that lag
          </label>
          <div className="lag-strip">
            {lags.map((l, i) => {
              const isUpcoming = i >= revealedCount;
              return (
                <button key={i}
                  className={`lag-chip ${i === selectedIdx && !isUpcoming ? 'active' : ''} ${isUpcoming ? 'upcoming' : ''}`}
                  onClick={() => onChipClick(i)}>
                  h = {l.label}
                  <span className="n-badge">N={l.n}</span>
                </button>
              );
            })}
          </div>

          <label className="control-label">Step through</label>
          <div className="step-controls">
            <button className="step-btn" onClick={onPrev} disabled={revealedCount === 0}>← Previous</button>
            <button className="step-btn primary" onClick={onNext} disabled={revealedCount >= lags.length}>Next →</button>
            <button className="step-btn" onClick={onReset} disabled={revealedCount === 0}>Reset</button>
          </div>
        </section>

        {/* §3 — Plot + summary */}
        <section className="panel">
          <div className="panel-header">
            <span className="panel-num">§ 3</span>
            <h2 className="panel-title">Empirical semivariogram</h2>
            <span className="panel-sub">{lags.length} lag distances · h ≤ {MAX_LAG_10X10.toFixed(0)}</span>
          </div>

          <div className="formula">
            γ(<span className="accent">h</span>) ={' '}
            1 ⁄ 2N(<span className="accent">h</span>) · Σ [ z(s<sub>i</sub>) − z(s<sub>j</sub>) ]²
          </div>

          <div className="plot-frame">
            <SemivariogramPlot
              lags={lags}
              selectedIdx={selectedIdx}
              revealedCount={revealedCount}
              modelName={modelName}
            />
          </div>

          <CalculationSummary lag={selectedLag} />
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
